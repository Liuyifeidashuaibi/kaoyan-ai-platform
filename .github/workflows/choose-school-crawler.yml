name: 择校数据中心爬虫

on:
  schedule:
    # 每日凌晨 TOP50 巡检（UTC 18:00 ≈ 北京时间 02:00）
    - cron: "0 18 * * *"
    # 每周日全量 148 校官方来源发现（UTC 19:00 周日 ≈ 北京时间周一 03:00）
    - cron: "0 19 * * 0"
    # 每月 1 日统计校验（UTC 20:00 1 日 ≈ 北京时间 04:00）
    - cron: "0 20 1 * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "运行模式"
        required: true
        default: patrol
        type: choice
        options:
          - patrol
          - update
          - full
          - discover-priority
          - build-whitelist
          - recompute-stats
          - seed-sources

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: crawler/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r crawler/requirements.txt
          playwright install chromium --with-deps

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 19 * * 0" ]; then
            echo "value=update" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 20 1 * *" ]; then
            echo "value=recompute-stats" >> "$GITHUB_OUTPUT"
          else
            echo "value=patrol" >> "$GITHUB_OUTPUT"
          fi

      - name: Run crawler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          CRAWLER_FAST: "1"
        run: |
          cd crawler
          python main.py ${{ steps.mode.outputs.value }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: choose-school-logs
          path: |
            crawler/logs/
            crawler/raw/
          if-no-files-found: ignore
