name: 择校数据中心爬虫

on:
  schedule:
    # 每日凌晨掌上考研增量同步（UTC 16:00 ≈ 北京时间 00:00）
    - cron: "0 16 * * *"
    # 每周日全量校验（UTC 17:00 周日 ≈ 北京时间周一 01:00）
    - cron: "0 17 * * 0"
  workflow_dispatch:
    inputs:
      mode:
        description: "运行模式"
        required: true
        default: sync
        type: choice
        options:
          - sync
          - full
          - import-only

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: crawler/kaoyan-cn/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: crawler/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r crawler/requirements.txt
          npm install --prefix crawler/kaoyan-cn

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 17 * * 0" ]; then
            echo "value=full" >> "$GITHUB_OUTPUT"
          else
            echo "value=sync" >> "$GITHUB_OUTPUT"
          fi

      - name: Run kaoyan.cn crawler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd crawler
          if [ "${{ steps.mode.outputs.value }}" = "import-only" ]; then
            python sync_kaoyan_cn.py --import-only
          elif [ "${{ steps.mode.outputs.value }}" = "full" ]; then
            python sync_kaoyan_cn.py --full
          else
            python sync_kaoyan_cn.py
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: choose-school-logs
          path: |
            crawler/data/kaoyan-cn/logs/
          if-no-files-found: ignore
