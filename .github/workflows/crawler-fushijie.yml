name: 爬虫 — 复试季（3-5月每日两次）

# 复试季：每年 3-5 月，每天 09:00 和 21:00 北京时间（01:00 / 13:00 UTC）
# 重点更新：复试分数线、拟录取名单、调剂信息、报录比
on:
  schedule:
    - cron: "0 1  * 3-5 *"   # 北京时间 09:00（UTC 01:00），3/4/5月每日
    - cron: "0 13 * 3-5 *"   # 北京时间 21:00（UTC 13:00），3/4/5月每日

  workflow_dispatch:
    inputs:
      force:
        description: "是否强制全量更新（忽略哈希增量判断）"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  update:
    name: 复试季增量更新
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: crawler/requirements.txt

      - name: Install dependencies
        run: pip install -r crawler/requirements.txt

      - name: Run update crawler (复试季)
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DASHSCOPE_API_KEY:         ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          cd crawler
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python crawl_updates_smart.py --season 复试季 $FORCE_FLAG

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: updates-log-fushijie-${{ github.run_number }}
          path: crawler/updates.log
          retention-days: 14
