# Render 一键部署 FastAPI 后端
# 文档: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: kaoyan-ai-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: LLM_MODEL
        value: qwen-plus
      - key: VL_MODEL
        value: qwen-vl-ocr-latest
      - key: PUBLIC_BASE_URL
        sync: false
      - key: CORS_ORIGINS
        value: https://kaoyan-ai-platform.vercel.app,http://localhost:3000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PROJECT_ROOT
        value: /app
